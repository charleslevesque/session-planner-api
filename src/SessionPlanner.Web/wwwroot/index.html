<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Planner</title>
    <base href="/" />
    <link rel="stylesheet" href="SessionPlanner.Web.styles.css" />
</head>
<body>
    <div id="app">
        <svg xmlns="http://www.w3.org/2000/svg" class="loading-progress">
            <style>
                .loading-progress { position: fixed; z-index: 1; inset: auto auto 0 50%; transform: translateX(-50%); }
            </style>
            <circle r="40%" cx="50%" cy="50%" style="fill: none; stroke: #e0e0e0; stroke-width: 0.1rem;" />
            <circle r="40%" cx="50%" cy="50%" class="cut" style="fill: none; stroke: #1b6ec2; stroke-width: 0.1rem; stroke-dasharray: 251%;" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>
    <div id="blazor-error-ui">
        Une erreur est survenue.
        <a href="" class="reload">Recharger</a>
        <a class="dismiss">X</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
